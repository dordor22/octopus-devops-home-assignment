services:
  app:
    build:
      context: ./app
    container_name: octopus-app
    ports:
      - "8080:3000"
    environment:
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: fruitdb
      COLLECTION_NAME: inventory
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: octopus-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fruitdb
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped

volumes:
  mongo_data:
